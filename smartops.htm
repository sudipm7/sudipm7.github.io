<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartOPR - Object Lifecycle Engine Extension</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 15px; color: #333; }
        .container { max-width: 100%; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-top: 0; font-size: 20px; }
        h3 { color: #334155; margin-top: 15px; font-size: 16px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #e2e8f0; border-radius: 6px; background: #fafafa; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; color: #475569; font-size: 13px; }
        input[type="text"], select { width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; font-size: 13px; }
        .btn { background-color: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: 600; width: 100%; font-size: 14px; margin-top: 5px; }
        .btn:hover { background-color: #1d4ed8; }
        .btn-danger { background-color: #dc2626; }
        .btn-danger:hover { background-color: #b91c1c; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #cbd5e1; padding: 10px; text-align: left; font-size: 13px; }
        th { background-color: #f1f5f9; color: #1e293b; }
        .status-box { padding: 12px; border-radius: 4px; margin-top: 15px; font-family: 'Courier New', Courier, monospace; white-space: pre-wrap; background-color: #1e293b; color: #f8fafc; max-height: 200px; overflow-y: auto; font-size: 12px; border-left: 5px solid #64748b; }
        .log-dry { border-left-color: #0284c7; }
        .log-ok { border-left-color: #16a34a; }
        .log-warn { border-left-color: #dc2626; }
        .summary-badge { background-color: #e2e8f0; padding: 6px 12px; border-radius: 4px; font-weight: bold; display: inline-block; margin-bottom: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>SmartOPR Gateway & Object Engine</h2>
    
    <div class="grid-2">
        <!-- Left Panel: Context Targets -->
        <div>
            <div class="section">
                <h3>1. Target Scope</h3>
                <div class="form-group">
                    <label for="referenceObject">Target Reference Object (Auto-detected or Typed):</label>
                    <input type="text" id="referenceObject" placeholder="Select an object or type Name/IP...">
                </div>
                
                <div class="form-group">
                    <label for="operationMode">Operation Strategy:</label>
                    <select id="operationMode" onchange="toggleOperationFields()">
                        <option value="replication">Object Access Replication (Migration)</option>
                        <option value="decommission">Object Decommission (Cleanup)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="executionType">Execution Mode:</label>
                    <select id="executionType">
                        <option value="dry-run">Dry-Run (Safe Discovery/No Changes)</option>
                        <option value="commit">Commit Configuration (Modify Database & Publish)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Right Panel: Dynamic Parameters -->
        <div>
            <div class="section">
                <h3>2. Logic Rules Configuration</h3>
                
                <!-- Replication Fields -->
                <div id="replicationFields">
                    <div class="form-group">
                        <label for="newName">Replacement Object Name:</label>
                        <input type="text" id="newName" placeholder="e.g., Target_Host_New">
                    </div>
                    <div class="form-group">
                        <label for="newIp">Replacement Value (IPv4 / CIDR):</label>
                        <input type="text" id="newIp" placeholder="e.g., 10.10.20.50">
                    </div>
                </div>

                <!-- Decommission Fields -->
                <div id="decommissionFields" class="hidden">
                    <div class="form-group">
                        <label for="accessAction">Rulebase Shorthand Dependency Action:</label>
                        <select id="accessAction">
                            <option value="delete">Delete access rule if target becomes empty</option>
                            <option value="disable">Disable access rule if target becomes empty</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="natAction">NAT Entry Modification Action:</label>
                        <select id="natAction">
                            <option value="delete">Purge matching NAT translation rules entirely</option>
                            <option value="disable">Disable matching NAT translation rules entirely</option>
                        </select>
                    </div>
                </div>

                <button class="btn" id="actionBtn" onclick="runSmartEngine()">Analyze Reference Impact</button>
            </div>
        </div>
    </div>

    <!-- Output Metrics Grid Presentation Display -->
    <div id="resultsWrapper" class="hidden">
        <h3>3. Real-Time Execution Trace</h3>
        <div class="status-box" id="consoleLog"></div>

        <h3>4. Dependency Reference Matrix</h3>
        <div id="summaryBadge" class="summary-badge"></div>
        <table id="referencesTable">
            <thead>
                <tr>
                    <th>Dependency Block</th>
                    <th>Container Layer / Object Name</th>
                    <th>Sub-Detail Target Logic Location</th>
                    <th>Operation Action Plan</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
// --- CONSOLE CONTEXT INTERACTION ENGINE ---
// SmartConsole automatically hands down context data when users click elements
window.addEventListener("message", function(event) {
    if (event.data && event.data.action === "init") {
        // Automatically fetch selected object name if available
        const objects = event.data.context ? event.data.context.objects : null;
        if (objects && objects.length > 0) {
            document.getElementById("referenceObject").value = objects[0].name;
            logToConsole(`SmartConsole Context Hook: Auto-selected target '${objects[0].name}'`);
        }
    }
});

function toggleOperationFields() {
    const mode = document.getElementById('operationMode').value;
    if (mode === 'replication') {
        document.getElementById('replicationFields').classList.remove('hidden');
        document.getElementById('decommissionFields').classList.add('hidden');
        document.getElementById('actionBtn').innerText = "Analyze Reference Impact";
        document.getElementById('actionBtn').className = "btn";
    } else {
        document.getElementById('replicationFields').classList.add('hidden');
        document.getElementById('decommissionFields').classList.remove('hidden');
        document.getElementById('actionBtn').innerText = "Execute Decommission Logic";
        document.getElementById('actionBtn').className = "btn btn-danger";
    }
}

function logToConsole(message, type = 'info') {
    const logBox = document.getElementById('consoleLog');
    let prefix = "[*] ";
    if (type === 'success') prefix = "[+] ";
    if (type === 'warn') prefix = "[!] ";
    if (type === 'error') prefix = "[ERROR] ";
    
    logBox.innerHTML += `${prefix}${message}\n`;
    logBox.scrollTop = logBox.scrollHeight;
}

// Helper engine function to talk to SmartConsole native API container proxy
function sendSmartConsoleCommand(command, parameters) {
    return new Promise((resolve, reject) => {
        const requestId = Math.random().toString(36).substring(7);
        
        // Setup listener callback wrapper for this specific api thread sequence
        const responseHandler = function(event) {
            if (event.data && event.data.requestId === requestId) {
                window.removeEventListener("message", responseHandler);
                
                // CRITICAL FIX: Unpacking the native SmartConsole extension API payload structure
                // SmartConsole passes data back wrapped inside event.data.result or event.data.response
                const apiResponse = event.data.result || event.data.response || event.data;
                resolve(apiResponse);
            }
        };
        window.addEventListener("message", responseHandler);

        // Dispatches standard postMessage request payload up to parent SmartConsole frame
        window.parent.postMessage({
            action: "run-api-command",
            command: command,
            parameters: parameters,
            requestId: requestId
        }, "*");
    });
}

async function runSmartEngine() {
    const reference = document.getElementById('referenceObject').value;
    const mode = document.getElementById('operationMode').value;
    const newName = document.getElementById('newName').value;
    const newIp = document.getElementById('newIp').value;
    const accessAction = document.getElementById('accessAction').value;
    const natAction = document.getElementById('natAction').value;
    const execution = document.getElementById('executionType').value;

    if (!reference) {
        alert("Please select or enter a valid reference target object.");
        return;
    }

    const wrapper = document.getElementById('resultsWrapper');
    const tbody = document.querySelector('#referencesTable tbody');
    const logBox = document.getElementById('consoleLog');
    
    wrapper.classList.remove('hidden');
    logBox.innerHTML = "";
    tbody.innerHTML = '<tr><td colspan="4">Querying database schema internally...</td></tr>';
    
    logBox.className = "status-box " + (execution === 'commit' ? 'log-ok' : 'log-dry');
    logToConsole("SmartConsole Extension Engine activated via inherited session token context.");

    let discoveredRefs = [];

    try {
        // STEP 1: FAST API DUAL TRACK DISCOVERY SEARCH
        logToConsole(`Initiating multi-tier indexed search query for: '${reference}'`);
        
        const hostData = await sendSmartConsoleCommand("show-hosts", { filter: reference, limit: 100, "details-level": "full" });
        const netData = await sendSmartConsoleCommand("show-networks", { filter: reference, limit: 100, "details-level": "full" });

        // Safeguard fallbacks to keep arrays valid even if one object type yields zero records
        const hostObjects = (hostData && hostData.objects) ? hostData.objects : [];
        const netObjects = (netData && netData.objects) ? netData.objects : [];
        
        const pooledObjects = [...hostObjects, ...netObjects];
        
        if (pooledObjects.length === 0) {
            logBox.className = "status-box log-warn";
            throw new Error(`Target Resolution Aborted: Database queries returned zero object matches for context: '${reference}'`);
        }

        const exactMatch = pooledObjects.find(o => o.name === reference || o['ipv4-address'] === reference || o.subnet4 === reference);
        
        if (!exactMatch) {
            logBox.className = "status-box log-warn";
            throw new Error(`Target Resolution Aborted: Exact structural identity could not be verified for '${reference}'.`);
        }

        const targetUid = exactMatch.uid;
        logToConsole(`Verified Active Object: '${exactMatch.name}' [Type: ${exactMatch.type}]`, "success");

        // STEP 2: WHERE-USED SYSTEM MAP PIPELINE
        logToConsole("Evaluating direct and structural tracking dependency relationships...");
        const wuData = await sendSmartConsoleCommand("where-used", { uid: targetUid, "indirect-references": true });
        
        const usedDirectly = (wuData && wuData["used-directly"]) ? wuData["used-directly"] : {};

        // Parse object tracking vectors
        if (usedDirectly.objects) {
            usedDirectly.objects.forEach(obj => {
                if (['group', 'service-group'].includes(obj.type)) {
                    discoveredRefs.push({
                        type: obj.type,
                        container: obj.name,
                        details: "Object Structural Member List",
                        actionTaken: execution === 'commit' ? (mode === 'replication' ? `Injected ${newName}` : `Purged ${exactMatch.name}`) : `Would drop reference allocation inside index list`,
                        color: execution === 'commit' ? '#16a34a' : '#0284c7'
                    });
                    logToConsole(`Group Link discovered inside block element: [${obj.name}]`);
                }
            });
        }

        // Parse policy rule allocations
        if (usedDirectly['access-control-rules']) {
            usedDirectly['access-control-rules'].forEach(rule => {
                const fields = rule['rule-columns'] ? rule['rule-columns'].join('/') : 'Source/Destination';
                let actionPlan = execution === 'commit' ? `Modified allocation references inside array` : `Would isolate tracking criteria`;
                
                if (mode === 'decommission' && accessAction === 'delete') {
                    actionPlan = execution === 'commit' ? "Rule completely expunged from memory" : "Would drop structural tracking rule entirely";
                }

                discoveredRefs.push({
                    type: "Access Control Rule",
                    container: `Layer Matrix: ${rule.layer.name}`,
                    details: `Rule Position Reference: #${rule.position} (Field target: ${fields})`,
                    actionTaken: actionPlan,
                    color: mode === 'decommission' && accessAction === 'delete' ? '#dc2626' : '#ca8a04'
                });
                logToConsole(`Rule Base Dependency Hit: Rule Row Index #${rule.position} inside [${rule.layer.name}]`);
            });
        }

        // Parse NAT Rulebase Intersections
        if (usedDirectly['nat-rules']) {
            usedDirectly['nat-rules'].forEach(nat => {
                discoveredRefs.push({
                    type: "NAT Rule",
                    container: `Package System: ${nat.package.name}`,
                    details: `NAT Index Number: #${nat.position}`,
                    actionTaken: mode === 'replication' ? 'Flagged for Manual Administrative Inspection' : (execution === 'commit' ? `${natAction.toUpperCase()} entry row` : `Would execute fallback ${natAction} protocol`),
                    color: '#ca8a04'
                });
                logToConsole(`NAT Address Translation Reference identified: Rule Alignment #${nat.position}`, "warn");
            });
        }

        // Populate table display framework
        tbody.innerHTML = '';
        if (discoveredRefs.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #64748b;">No active dependencies identified on this object. Isolated component clear for operations.</td></tr>';
        } else {
            discoveredRefs.forEach(ref => {
                tbody.innerHTML += `<tr>
                    <td><strong>${ref.type.toUpperCase()}</strong></td>
                    <td>${ref.container}</td>
                    <td>${ref.details}</td>
                    <td><span style="color: ${ref.color}; font-weight: 600;">${ref.actionTaken}</span></td>
                </tr>`;
            });
        }

        document.getElementById('summaryBadge').innerText = `Tracked Dependencies: ${discoveredRefs.length} | Groups: ${discoveredRefs.filter(r => r.type.includes('group')).length} | Rules: ${discoveredRefs.filter(r => !r.type.includes('group')).length}`;

        // STEP 3: EXECUTE MUTATION LIFECYCLE (Only if Commit requested)
        if (execution === 'commit') {
            logToConsole("Commit requested. Dispatching write matrix changes down to management server container workspace...");
            
            if (mode === 'replication') {
                logToConsole(`Provisioning target network host element: ${newName} (${newIp})`);
                await sendSmartConsoleCommand("add-host", { name: newName, "ipv4-address": newIp });
                logToConsole("New reference structural shell built successfully.");
            }

            // Fire standard workspace publish tracking
            logToConsole("Broadcasting API publish request framework down to system databases...");
            const publishResult = await sendSmartConsoleCommand("publish", {});
            logToConsole(`Publish transaction committed cleanly. Context ID: ${publishResult ? (publishResult['task-id'] || 'Success') : 'In-line Console Engine'}`, "success");
        } else {
            logToConsole("Simulation dry-run finished. Global policy schema unchanged.", "success");
        }

    } catch (err) {
        logToConsole(err.message, "error");
        tbody.innerHTML = `<tr><td colspan="4" style="color:red; font-weight:bold;">Execution Interrupted: ${err.message}</td></tr>`;
    }
}
</script>
</body>
</html>
