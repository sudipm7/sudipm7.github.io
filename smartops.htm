<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smartops Extension</title>
    <style>
        body {
            font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            font-size: 12px;
            color: #333333;
            background-color: #f1f2f5;
            margin: 0;
            padding: 12px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header-bar {
            background-color: #ffffff;
            border: 1px solid #dcdcdc;
            padding: 10px 15px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .header-title {
            font-size: 14px;
            font-weight: bold;
            color: #333333;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-title span {
            color: #da291c;
            text-transform: uppercase;
        }
        .header-version {
            font-size: 11px;
            color: #777777;
        }
        .panel {
            background-color: #ffffff;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            padding: 16px;
            margin-bottom: 12px;
            position: relative;
        }
        .panel-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 8px;
        }
        .panel-badge {
            background-color: #da291c;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
        }
        .panel-title {
            font-size: 12px;
            font-weight: bold;
            color: #444444;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #555555;
        }
        select, input[type="text"] {
            width: 100%;
            max-width: 400px;
            padding: 5px 8px;
            border: 1px solid #cccccc;
            border-radius: 3px;
            box-sizing: border-box;
            font-size: 12px;
            background-color: #ffffff;
        }
        select:focus, input[type="text"]:focus {
            border-color: #da291c;
            outline: none;
        }
        button {
            background-color: #da291c;
            color: white;
            border: 1px solid #c11616;
            padding: 6px 14px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 3px;
            font-weight: 500;
        }
        button:hover {
            background-color: #b81d13;
        }
        button.secondary {
            background-color: #ffffff;
            color: #333333;
            border: 1px solid #cccccc;
        }
        button.secondary:hover {
            background-color: #f5f5f5;
        }
        button.danger {
            background-color: #bd362f;
            border-color: #a12e28;
        }
        button.danger:hover {
            background-color: #a12e28;
        }
        .hidden {
            display: none;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            background: #ffffff;
        }
        th, td {
            border: 1px solid #e0e0e0;
            text-align: left;
            padding: 7px 10px;
            font-size: 12px;
        }
        th {
            background-color: #f5f6f8;
            color: #555555;
            font-weight: 600;
        }
        tr:hover {
            background-color: #f9f9fb;
        }
        .status-message {
            padding: 10px 14px;
            margin-top: 10px;
            border-radius: 3px;
            font-weight: 500;
            border-left: 4px solid transparent;
        }
        .status-loading { background-color: #e8f4fd; color: #1d6fa5; border-left-color: #2b8ed2; }
        .status-success { background-color: #edf7ed; color: #2a662c; border-left-color: #4caf50; }
        .status-error { background-color: #fdf2f2; color: #9c2424; border-left-color: #da291c; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <div class="header-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#da291c" style="vertical-align: middle;"><path d="M12 2L2 22h20L12 2zm0 3.99L19.53 19H4.47L12 5.99z"/></svg>
            CP <span>Smartops</span>
        </div>
        <div class="header-version">v0.1</div>
    </div>
    
    <div class="panel">
        <div class="panel-header">
            <div class="panel-badge">1</div>
            <div class="panel-title">Task & Action Method</div>
        </div>
        <div class="form-group">
            <label for="operationSelect">Type:</label>
            <select id="operationSelect" onchange="toggleOperationFields()">
                <option value="decom">Object Decommission</option>
                <option value="replica">Rule Replication</option>
            </select>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            <div class="panel-badge">2</div>
            <div class="panel-title">Target Parameters</div>
        </div>
        
        <div id="decomForm">
            <div class="form-group">
                <label for="decomIp">Enter the IP address of the object to decommission:</label>
                <input type="text" id="decomIp" placeholder="e.g., 192.168.10.25">
            </div>
            <button onclick="searchObjectUsage('decom')">Search Object Usage</button>
        </div>

        <div id="replicaForm" class="hidden">
            <div class="form-group">
                <label for="existingIp">Existing Object IP:</label>
                <input type="text" id="existingIp" placeholder="e.g., 10.0.0.5" style="margin-bottom: 10px;">
                <label for="newIp">New Object IP:</label>
                <input type="text" id="newIp" placeholder="e.g., 10.0.0.6">
            </div>
            <button onclick="searchObjectUsage('replica')">Search Existing Policies</button>
        </div>

        <div id="statusIndicator" class="status-message hidden"></div>
    </div>

    <div id="resultsPanel" class="panel hidden">
        <div class="panel-header">
            <div class="panel-badge">3</div>
            <div class="panel-title">Discovered Policy Reference Mapping</div>
        </div>
        
        <div style="margin-bottom: 12px; display: flex; gap: 8px;">
            <button class="secondary" onclick="exportToCsv()">Export to CSV</button>
            <button id="executeBtn" class="danger" onclick="executeAction()">Remove Object</button>
        </div>
        
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>Package / Layer</th>
                        <th>Rule ID</th>
                        <th>Name / Type</th>
                        <th>Source Reference</th>
                        <th>Destination Reference</th>
                        <th>Service</th>
                    </tr>
                </thead>
                <tbody id="usageTableBody">
                    <!-- Dynamic Rows -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let discoveredUsage = [];
    let targetObjectUid = "";
    let targetObjectName = "";
    let currentOp = "decom";

    // --- NATIVE EMBEDDED CHECK POINT HANDSHAKE ENGINE (OFFLINE FRIENDLY) ---
    let queryIdCount = 1;
    const pendingRequests = {};
    let isSmartConsoleConnected = false;

    window.addEventListener("message", function(event) {
        if (!event.data || typeof event.data !== "object") return;
        
        // Check for initialization signal from SmartConsole frame container
        if (event.data.action === "init") {
            isSmartConsoleConnected = true;
            console.log("Successfully handshaked with SmartConsole frame.");
            return;
        }

        // Match returning execution call queries
        if (event.data.queryId && pendingRequests[event.data.queryId]) {
            const promiseHandler = pendingRequests[event.data.queryId];
            delete pendingRequests[event.data.queryId];
            
            if (event.data.status === "Success") {
                promiseHandler.resolve(event.data.output);
            } else {
                promiseHandler.reject(new Error(event.data.message || "SmartConsole management API returned error status."));
            }
        }
    });

    // Send a message up to SmartConsole to announce frame readiness
    function initSmartConsoleHandshake() {
        window.parent.postMessage({ action: "started" }, "*");
    }
    setTimeout(initSmartConsoleHandshake, 500);

    function runSmartConsoleCmd(command, payload) {
        return new Promise((resolve, reject) => {
            if (!isSmartConsoleConnected) {
                // True offline/fallback debug simulator if checked inside a basic standard web browser
                console.warn("SmartConsole frame channel not detected. Using local simulator view.");
                setTimeout(() => {
                    if (command === "show-hosts") {
                        resolve({ objects: [{ name: "Simulated_Host", uid: "sim-uid-123", "ipv4-address": payload.filter }] });
                    } else if (command === "where-used") {
                        resolve({
                            "used-directly": { "objects": [{ name: "Corporate_Rulebase", type: "access-rule", uid: "r-1", layer: "Network", package: "Standard", ruleIndex: 44 }] },
                            "used-indirectly": { "objects": [{ name: "Database_Group", type: "group", uid: "g-1", package: "Standard" }] }
                        });
                    } else { resolve({ status: "Success" }); }
                }, 600);
                return;
            }

            const currentQueryId = "query_" + (queryIdCount++);
            pendingRequests[currentQueryId] = { resolve, reject };

            window.parent.postMessage({
                action: "execute-command",
                command: command,
                parameters: payload,
                queryId: currentQueryId
            }, "*");
        });
    }
    // --- END HANDSHAKE ENGINE ---

    function toggleOperationFields() {
        const op = document.getElementById("operationSelect").value;
        currentOp = op;
        document.getElementById("resultsPanel").classList.add("hidden");
        document.getElementById("statusIndicator").classList.add("hidden");
        discoveredUsage = [];

        if (op === "decom") {
            document.getElementById("decomForm").classList.remove("hidden");
            document.getElementById("replicaForm").classList.add("hidden");
            document.getElementById("executeBtn").innerText = "Remove Object";
            document.getElementById("executeBtn").className = "danger";
        } else {
            document.getElementById("decomForm").classList.add("hidden");
            document.getElementById("replicaForm").classList.remove("hidden");
            document.getElementById("executeBtn").innerText = "Replicate Object";
            document.getElementById("executeBtn").className = "";
        }
    }

    function showStatus(text, type) {
        const indicator = document.getElementById("statusIndicator");
        indicator.className = `status-message status-${type}`;
        indicator.innerText = text;
        indicator.classList.remove("hidden");
    }

    async function searchObjectUsage(type) {
        const ipInput = type === 'decom' ? document.getElementById("decomIp").value : document.getElementById("existingIp").value;
        if (!ipInput.trim()) {
            showStatus("Please specify a valid IP address.", "error");
            return;
        }

        showStatus("Connecting to Management API and searching rule bases...", "loading");
        document.getElementById("resultsPanel").classList.add("hidden");
        discoveredUsage = [];

        try {
            const hostLookup = await runSmartConsoleCmd("show-hosts", { "filter": ipInput, "details-level": "full" });
            if (!hostLookup.objects || hostLookup.objects.length === 0) {
                showStatus(`No configured host object detected matching IP: ${ipInput}`, "error");
                return;
            }

            const targetHost = hostLookup.objects[0];
            targetObjectUid = targetHost.uid;
            targetObjectName = targetHost.name;

            const usageData = await runSmartConsoleCmd("where-used", { "object": targetObjectUid, "indirect-usage": true });
            processUsageResults(usageData);
        } catch (err) {
            showStatus("API Error: " + err.message, "error");
        }
    }

    function processUsageResults(data) {
        const tbody = document.getElementById("usageTableBody");
        tbody.innerHTML = "";
        discoveredUsage = [];

        if (data["used-directly"] && data["used-directly"]["objects"]) {
            data["used-directly"]["objects"].forEach(item => {
                discoveredUsage.push({
                    uid: item.uid,
                    name: item.name,
                    type: item.type,
                    layer: item.layer || "N/A",
                    package: item.package || "Global/Group",
                    ruleId: item.ruleIndex !== undefined ? item.ruleIndex : "N/A",
                    source: item.type === "access-rule" ? "Direct Match" : "Group Member",
                    destination: item.type === "access-rule" ? "Direct Match" : "Group Member"
                });
            });
        }

        if (data["used-indirectly"] && data["used-indirectly"]["objects"]) {
            data["used-indirectly"]["objects"].forEach(item => {
                const isDuplicate = discoveredUsage.some(existing => existing.uid === item.uid);
                if (!isDuplicate) {
                    discoveredUsage.push({
                        uid: item.uid,
                        name: item.name,
                        type: item.type,
                        layer: item.layer || "N/A",
                        package: item.package || "Global/Nested Group",
                        ruleId: item.ruleIndex !== undefined ? item.ruleIndex : "N/A",
                        source: "Nested in Group / Dependency",
                        destination: "Nested in Group / Dependency"
                    });
                }
            });
        }

        if (discoveredUsage.length === 0) {
            showStatus(`Object (${targetObjectName}) found but is completely clean (not used anywhere).`, "success");
            return;
        }

        discoveredUsage.forEach(row => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td><b>${escapeHtml(row.package)}</b><br><small style="color:#777;">${escapeHtml(row.layer)}</small></td>
                <td>${escapeHtml(String(row.ruleId))}</td>
                <td><b>${escapeHtml(row.name)}</b><br><small style="color:#da291c;">Type: ${escapeHtml(row.type)}</small></td>
                <td><span style="font-size:11px; color:#555;">${escapeHtml(row.source)}</span></td>
                <td><span style="font-size:11px; color:#555;">${escapeHtml(row.destination)}</span></td>
                <td>Any</td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById("statusIndicator").classList.add("hidden");
        document.getElementById("resultsPanel").classList.remove("hidden");
    }

    async function executeAction() {
        showStatus("Processing updates on Management Server...", "loading");
        try {
            if (currentOp === "decom") {
                for (let i = 0; i < discoveredUsage.length; i++) {
                    let ref = discoveredUsage[i];
                    if (ref.type === "access-rule") {
                        let ruleObj = await runSmartConsoleCmd("show-access-rule", { "uid": ref.uid, "layer": ref.layer });
                        let srcIsSingle = (ruleObj.source && ruleObj.source.length === 1 && ruleObj.source[0].uid === targetObjectUid);
                        let dstIsSingle = (ruleObj.destination && ruleObj.destination.length === 1 && ruleObj.destination[0].uid === targetObjectUid);

                        if (srcIsSingle || dstIsSingle) {
                            await runSmartConsoleCmd("delete-access-rule", { "uid": ref.uid, "layer": ref.layer });
                        } else {
                            await runSmartConsoleCmd("set-access-rule", {
                                "uid": ref.uid, "layer": ref.layer,
                                "source": { "remove": targetObjectName },
                                "destination": { "remove": targetObjectName }
                            });
                        }
                    } else if (ref.type === "group") {
                        await runSmartConsoleCmd("set-group", { "uid": ref.uid, "members": { "remove": targetObjectName } });
                    }
                }
                await runSmartConsoleCmd("delete-host", { "uid": targetObjectUid });
                showStatus("Decommissioning finished! Review your changes and Publish them in SmartConsole.", "success");
            } else {
                const newIpStr = document.getElementById("newIp").value;
                if (!newIpStr) {
                    showStatus("Error: Missing target replacement input.", "error");
                    return;
                }

                let newHostLookup = await runSmartConsoleCmd("show-hosts", { "filter": newIpStr });
                let newObjName = "";

                if (!newHostLookup.objects || newHostLookup.objects.length === 0) {
                    newObjName = "H_" + newIpStr.replace(/\./g, "_");
                    await runSmartConsoleCmd("add-host", { "name": newObjName, "ip-address": newIpStr });
                } else {
                    newObjName = newHostLookup.objects[0].name;
                }

                for (let i = 0; i < discoveredUsage.length; i++) {
                    let ref = discoveredUsage[i];
                    if (ref.type === "access-rule") {
                        await runSmartConsoleCmd("set-access-rule", {
                            "uid": ref.uid, "layer": ref.layer,
                            "source": { "add": newObjName }, "destination": { "add": newObjName }
                        });
                    } else if (ref.type === "group") {
                        await runSmartConsoleCmd("set-group", { "uid": ref.uid, "members": { "add": newObjName } });
                    }
                }
                showStatus("Replication complete! Review your changes and click Publish.", "success");
            }
            document.getElementById("resultsPanel").classList.add("hidden");
        } catch (ex) {
            showStatus("Failure performing adjustments: " + ex.message, "error");
        }
    }

    function exportToCsv() {
        let csvContent = "data:text/csv;charset=utf-8,Package/Layer,Rule ID,Object Name,Type\n";
        discoveredUsage.forEach(r => {
            csvContent += `"${r.package}/${r.layer}","${r.ruleId}","${r.name}","${r.type}"\n`;
        });
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `smartops_report_${targetObjectName || "export"}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
</script>
</body>
</html>
